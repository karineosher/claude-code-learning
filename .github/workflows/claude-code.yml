name: Claude Code Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  claude-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Ação da Base de Código Claude
        uses: anthropics/claude-code-base-action@beta
        with:
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          custom_instructions: |
            You are Claude Code, running in GitHub Actions.
            - You have access to the repository code
            - You can create files, modify code, run tests
            - Always create clear commit messages
          allowed_tools: "Bash(npm:*),Bash(git:*)"
        
